<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>채팅</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- 로그인 화면 -->
    <div id="auth-area">
      <div id="login-box" class="join-box">
        <h2>💬 채팅</h2>
        <input id="auth-name" placeholder="닉네임" />
        <input id="auth-password" type="password" placeholder="비밀번호" />
        <button id="auth-btn" onclick="handleAuth()">로그인</button>
        <p id="auth-error" class="auth-error"></p>
        <div class="auth-links">
          계정이 없으신가요?
          <a href="/register.html">회원가입</a>
        </div>
      </div>
    </div>

    <!-- 채팅 화면 -->
    <div id="chat-area" style="display: none">
      <div class="chat-wrapper">
        <!-- 방 목록 사이드바 -->
        <div class="room-sidebar">
          <div class="room-sidebar-header">채팅방</div>
          <ul id="room-list"></ul>
          <div class="room-create">
            <input id="room-input" placeholder="방 이름" />
            <button onclick="createRoom()">만들기</button>
          </div>
        </div>

        <!-- 메인 채팅 -->
        <div class="chat-main">
          <div class="chat-header">
            <h2 id="current-room">방을 선택하세요</h2>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
          </div>
          <div id="messages"></div>
          <div id="input-area">
            <label class="file-btn" for="file-input">+</label>
            <input
              type="file"
              id="file-input"
              style="display: none"
              accept="image/*,.pdf,.zip,.txt"
              onchange="uploadFile(this)"
            />
            <input id="msg-input" placeholder="메시지를 입력하세요" />
            <button onclick="sendMessage()">전송</button>
          </div>
        </div>

        <!-- 접속자 사이드바 -->
        <div class="sidebar" style="display: none">
          <div class="sidebar-header">
            접속자 <span id="user-count">0</span>명
          </div>
          <ul id="user-list"></ul>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      let socket = null;
      let myName = '';
      let currentRoom = null;

      // 로그인 / 회원가입 처리
      async function handleAuth() {
        const name = document.getElementById('auth-name').value.trim();
        const password = document.getElementById('auth-password').value;
        const errorEl = document.getElementById('auth-error');

        if (!name || !password) {
          errorEl.textContent = '닉네임과 비밀번호를 입력해주세요.';
          return;
        }

        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            errorEl.textContent = data.error;
            return;
          }

          localStorage.setItem('token', data.token);
          localStorage.setItem('name', data.name);
          myName = data.name;

          connectSocket(data.token);
        } catch (err) {
          errorEl.textContent = '서버 오류가 발생했어요.';
          console.error(err);
        }
      }

      // Socket.io 연결 — JWT 포함
      function connectSocket(token) {
        socket = io({
          auth: { token }, // 서버의 io.use()에서 검증해요
        });

        socket.on('connect_error', (err) => {
          console.error('연결 실패:', err.message);
          localStorage.removeItem('token');
          localStorage.removeItem('name');
          document.getElementById('auth-area').style.display = 'flex';
          document.getElementById('chat-area').style.display = 'none';
          document.getElementById('auth-error').textContent = err.message;
        });

        socket.on('connect', () => {
          document.getElementById('auth-area').style.display = 'none';
          document.getElementById('chat-area').style.display = 'flex';
        });

        // 방 목록 업데이트
        socket.on('update_rooms', (rooms) => {
          const list = document.getElementById('room-list');
          list.innerHTML = rooms
            .map(
              (room) => `
          <li class="${room.name === currentRoom ? 'active' : ''}"
              onclick="joinRoom('${room.name}')">
            <span># ${room.name}</span>
            ${
              room.owner === myName
                ? `<button class="delete-btn" onclick="deleteRoom(event, '${room.name}')">✕</button>`
                : ''
            }
          </li>
        `,
            )
            .join('');
        });

        socket.on('update_users', (users) => {
          const list = document.getElementById('user-list');
          const count = document.getElementById('user-count');
          count.textContent = users.length;
          list.innerHTML = users
            .map(
              (name) => `
          <li class="${name === myName ? 'me' : ''}">
            <span class="status-dot"></span>
            ${name} ${name === myName ? '(나)' : ''}
          </li>
        `,
            )
            .join('');
        });

        socket.on('notice', (message) => {
          const box = document.getElementById('messages');
          box.innerHTML += `<div class="notice">${message}</div>`;
          box.scrollTop = box.scrollHeight;
        });

        socket.on('receive_message', (data) => {
          const box = document.getElementById('messages');
          box.innerHTML += renderMessage(data, data.sender === myName);
          box.scrollTop = box.scrollHeight;
        });

        socket.on('room_deleted', (roomName) => {
          if (currentRoom === roomName) {
            currentRoom = null;
            document.getElementById('current-room').textContent =
              '방을 선택하세요';
            document.getElementById('messages').innerHTML =
              `<div class="notice">'${roomName}' 방이 삭제되었습니다.</div>`;
            document.querySelector('.sidebar').style.display = 'none';
          }
        });

        socket.on('room_info', (info) => {
          currentRoomOwner = info.owner;
        });

        socket.on('join_error', (message) => {
          alert(message);
          logout();
        });
      }

      // 로그아웃
      function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('name');
        if (socket) socket.disconnect();
        socket = null;
        myName = '';
        currentRoom = null;

        document.getElementById('auth-area').style.display = 'flex';
        document.getElementById('chat-area').style.display = 'none';
        document.getElementById('auth-name').value = '';
        document.getElementById('auth-password').value = '';
        document.getElementById('auth-error').textContent = '';
      }

      // 페이지 로드 시 토큰 있으면 자동 로그인
      window.addEventListener('load', () => {
        const token = localStorage.getItem('token');
        const name = localStorage.getItem('name');
        if (token && name) {
          myName = name;
          connectSocket(token);
        }
      });

      function joinRoom(roomName) {
        if (roomName === currentRoom) return;
        currentRoom = roomName;
        document.querySelector('.sidebar').style.display = 'flex';
        document.getElementById('current-room').textContent = `# ${roomName}`;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('msg-input').focus();
        socket.emit('join_room', roomName);
        document.querySelectorAll('#room-list li').forEach((li) => {
          li.classList.toggle(
            'active',
            li.textContent.trim().startsWith(`# ${roomName}`),
          );
        });
      }

      function createRoom() {
        const name = document.getElementById('room-input').value.trim();
        if (!name) return;
        socket.emit('create_room', name);
        document.getElementById('room-input').value = '';
      }

      function deleteRoom(event, roomName) {
        event.stopPropagation();
        if (!confirm(`'${roomName}' 방을 삭제할까요?`)) return;
        socket.emit('delete_room', roomName);
      }

      async function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;

        if (file.size > 5 * 1024 * 1024) {
          alert('파일 크기는 5MB 이하만 가능해요!');
          input.value = '';
          return;
        }

        const formData = new FormData();
        formData.append('file', file);

        try {
          const token = localStorage.getItem('token');
          const res = await fetch('/upload', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
            body: formData,
          });

          if (!res.ok) throw new Error('업로드 실패');

          const data = await res.json();
          const isImage = file.type.startsWith('image/');

          socket.emit('send_message', {
            message: '',
            fileUrl: data.url,
            fileName: data.originalName,
            fileType: isImage ? 'image' : 'file',
          });

          input.value = '';
        } catch (err) {
          alert('파일 업로드에 실패했어요!');
          console.error(err);
        }
      }

      function renderMessage(data, isMine) {
        const time =
          typeof data.time === 'string' && !data.time.includes('T')
            ? data.time
            : new Date(data.time).toLocaleTimeString('ko-KR');

        function formatExpiry(expiredAt) {
          if (!expiredAt) return '';
          const diff = Math.floor(
            (new Date(expiredAt) - Date.now()) / 1000 / 60 / 60,
          );
          if (diff <= 0) return '<span class="expired">만료됨</span>';
          return `<span class="expiry">⏱ ${diff}시간 후 만료</span>`;
        }

        let content = '';
        if (data.fileType === 'image') {
          const filename = data.fileUrl.split('/').pop();
          content = `
          <div class="bubble bubble-file" style="padding: 6px;">
            <a href="/upload/download/${filename}" target="_blank">
              <img src="${data.fileUrl}" alt="${data.fileName}"
                   style="max-width:200px; max-height:200px;
                          border-radius:6px; cursor:pointer; display:block;" />
            </a>
            ${formatExpiry(data.expiredAt)}
          </div>`;
        } else if (data.fileType === 'file') {
          const filename = data.fileUrl.split('/').pop();
          content = `
          <div class="bubble bubble-file" style="padding: 0;">
            <a href="/upload/download/${filename}" class="file-link">
              📎 ${data.fileName}
            </a>
            ${formatExpiry(data.expiredAt)}
          </div>`;
        } else {
          content = `<div class="bubble">${data.message}</div>`;
        }

        return `
        <div class="msg ${isMine ? 'mine' : 'other'}">
          ${!isMine ? `<span class="name">${data.sender}</span>` : ''}
          ${content}
          <span class="time">${time}</span>
        </div>
      `;
      }

      function sendMessage() {
        if (!currentRoom) return alert('채팅방을 먼저 선택해주세요!');
        const message = document.getElementById('msg-input').value;
        if (!message.trim()) return;
        socket.emit('send_message', { message });
        document.getElementById('msg-input').value = '';
      }

      document.getElementById('msg-input')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      document
        .getElementById('auth-password')
        ?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleAuth();
        });
      document
        .getElementById('room-input')
        ?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') createRoom();
        });
    </script>
  </body>
</html>
