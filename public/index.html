<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>채팅</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- 입장 전 화면 -->
    <div id="join-area">
      <div class="join-box">
        <h2>💬 채팅방 입장</h2>
        <input id="name-input" placeholder="이름을 입력하세요" />
        <button onclick="joinChat()">입장하기</button>
      </div>
    </div>

    <!-- 입장 후 화면 -->
    <div id="chat-area" style="display: none">
      <div class="chat-wrapper">
        <!-- 방 목록 사이드바 -->
        <div class="room-sidebar">
          <div class="room-sidebar-header">채팅방</div>
          <ul id="room-list"></ul>
          <div class="room-create">
            <input id="room-input" placeholder="방 이름" />
            <button onclick="createRoom()">만들기</button>
          </div>
        </div>

        <!-- 메인 채팅 영역 -->
        <div class="chat-main">
          <div class="chat-header">
            <h2 id="current-room">방을 선택하세요</h2>
          </div>
          <div id="messages"></div>
          <div id="input-area">
            <input id="msg-input" placeholder="메시지를 입력하세요" />
            <button onclick="sendMessage()">전송</button>
          </div>
        </div>

        <!-- 접속자 사이드바 -->
        <div class="sidebar">
          <div class="sidebar-header">
            접속자 <span id="user-count">0</span>명
          </div>
          <ul id="user-list"></ul>
        </div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      let myName = '';
      let currentRoom = null;
      let currentRoomOwner = null; // 현재 방의 방장

      function joinChat() {
        const name = document.getElementById('name-input').value.trim();
        if (!name) return alert('이름을 입력해주세요!');
        myName = name;

        document.getElementById('join-area').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';

        socket.emit('user_join', name);
      }

      // 입장 에러 (중복 닉네임 등)
      socket.on('join_error', (message) => {
        alert(message);
        document.getElementById('join-area').style.display = 'flex';
        document.getElementById('chat-area').style.display = 'none';
      });

      // 방 목록 업데이트
      socket.on('update_rooms', (rooms) => {
        const list = document.getElementById('room-list');
        list.innerHTML = rooms
          .map(
            (room) => `
    <li class="${room.name === currentRoom ? 'active' : ''}"
        onclick="joinRoom('${room.name}')">
      <span># ${room.name}</span>
      ${
        room.owner === myName
          ? `<button class="delete-btn" onclick="deleteRoom(event, '${room.name}')">✕</button>`
          : ''
      }
    </li>
  `,
          )
          .join('');
      });

      function joinRoom(roomName) {
        if (roomName === currentRoom) return;
        currentRoom = roomName;

        // 방 입장 시 사이드바 표시
        document.querySelector('.sidebar').style.display = 'flex';

        document.getElementById('current-room').textContent = `# ${roomName}`;
        document.getElementById('messages').innerHTML = '';
        document.getElementById('msg-input').focus();

        socket.emit('join_room', roomName);

        document.querySelectorAll('#room-list li').forEach((li) => {
          li.classList.toggle(
            'active',
            li.textContent.trim().startsWith(`# ${roomName}`),
          );
        });
      }

      function createRoom() {
        const name = document.getElementById('room-input').value.trim();
        if (!name) return;
        socket.emit('create_room', name);
        document.getElementById('room-input').value = '';
      }

      function deleteRoom(event, roomName) {
        event.stopPropagation(); // li 클릭 이벤트 막기
        if (!confirm(`'${roomName}' 방을 삭제할까요?`)) return;
        socket.emit('delete_room', roomName);
      }

      // 방 삭제됐을 때 (강제 퇴장)
      socket.on('room_deleted', (roomName) => {
        if (currentRoom === roomName) {
          currentRoom = null;
          currentRoomOwner = null;
          document.getElementById('current-room').textContent =
            '방을 선택하세요';
          document.getElementById('messages').innerHTML = '';
          document.getElementById('messages').innerHTML +=
            `<div class="notice">'${roomName}' 방이 삭제되었습니다.</div>`;
          // 사이드바 다시 숨기기
          document.querySelector('.sidebar').style.display = 'none';
        }
      });

      // 방 정보 (방장 확인용)
      socket.on('room_info', (info) => {
        currentRoomOwner = info.owner;
      });

      socket.on('update_users', (users) => {
        const list = document.getElementById('user-list');
        const count = document.getElementById('user-count');

        count.textContent = users.length;
        list.innerHTML = users
          .map(
            (name) => `
    <li class="${name === myName ? 'me' : ''}">
      <span class="status-dot"></span>
      ${name} ${name === myName ? '(나)' : ''}
    </li>
  `,
          )
          .join('');
      });

      // 마지막 접속 시간 포맷
      function getLastSeen(date) {
        const diff = Math.floor((Date.now() - new Date(date)) / 60000);
        if (diff < 1) return '방금 전';
        if (diff < 60) return `${diff}분 전`;
        if (diff < 1440) return `${Math.floor(diff / 60)}시간 전`;
        return `${Math.floor(diff / 1440)}일 전`;
      }

      // 이전 메시지 불러오기
      socket.on('load_messages', (messages) => {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        messages.forEach((data) => {
          const isMine = data.sender === myName;
          box.innerHTML += `
      <div class="msg ${isMine ? 'mine' : 'other'}">
        ${!isMine ? `<span class="name">${data.sender}</span>` : ''}
        <div class="bubble">${data.message}</div>
        <span class="time">${new Date(data.time).toLocaleTimeString('ko-KR')}</span>
      </div>
    `;
        });
        box.scrollTop = box.scrollHeight;
      });

      socket.on('notice', (message) => {
        const box = document.getElementById('messages');
        box.innerHTML += `<div class="notice">${message}</div>`;
        box.scrollTop = box.scrollHeight;
      });

      socket.on('receive_message', (data) => {
        const box = document.getElementById('messages');
        const isMine = data.sender === myName;
        box.innerHTML += `
    <div class="msg ${isMine ? 'mine' : 'other'}">
      ${!isMine ? `<span class="name">${data.sender}</span>` : ''}
      <div class="bubble">${data.message}</div>
      <span class="time">${data.time}</span>
    </div>
  `;
        box.scrollTop = box.scrollHeight;
      });

      function sendMessage() {
        if (!currentRoom) return alert('채팅방을 먼저 선택해주세요!');
        const message = document.getElementById('msg-input').value;
        if (!message.trim()) return;

        socket.emit('send_message', { sender: myName, message });
        document.getElementById('msg-input').value = '';
      }

      document.getElementById('msg-input')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
      });
      document
        .getElementById('name-input')
        ?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') joinChat();
        });
      document
        .getElementById('room-input')
        ?.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') createRoom();
        });
    </script>
  </body>
</html>
